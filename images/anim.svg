<svg xmlns="http://www.w3.org/2000/svg" width="800" height="120" viewBox="0 0 800 120">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a2e1c" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#0a0f0b" stop-opacity="0"/>
    </radialGradient>
    <pattern id="scan" x="0" y="0" width="800" height="4" patternUnits="userSpaceOnUse">
      <rect x="0" y="3" width="800" height="1" fill="rgba(0,0,0,0.025)"/>
    </pattern>
  </defs>

  <rect width="800" height="120" fill="#0a0f0b"/>
  <rect width="800" height="120" fill="url(#bg)"/>
  <rect width="800" height="120" fill="url(#scan)"/>
  <rect x=".5" y=".5" width="799" height="119" fill="none" stroke="rgba(79,157,91,.35)" stroke-width="1"/>
  <rect x="3.5" y="3.5" width="793" height="113" fill="none" stroke="rgba(79,157,91,.12)" stroke-width="1"/>
  <rect x="6" y="6" width="4" height="4" fill="rgba(79,157,91,.4)"/>
  <rect x="790" y="6" width="4" height="4" fill="rgba(79,157,91,.4)"/>
  <rect x="6" y="110" width="4" height="4" fill="rgba(79,157,91,.4)"/>
  <rect x="790" y="110" width="4" height="4" fill="rgba(79,157,91,.4)"/>

  <!-- stars -->
  <circle cx="40" cy="18" r="1.5" fill="#AFC3B2"><animate attributeName="opacity" values=".8;.1;.8" dur="2.1s" repeatCount="indefinite"/></circle>
  <circle cx="185" cy="12" r="2" fill="#4F9D5B"><animate attributeName="opacity" values=".2;1;.2" dur="3.2s" repeatCount="indefinite" begin="-1.1s"/></circle>
  <circle cx="230" cy="26" r="1.5" fill="#AFC3B2"><animate attributeName="opacity" values=".9;.1;.9" dur="2.8s" repeatCount="indefinite" begin="-.6s"/></circle>
  <circle cx="400" cy="14" r="2" fill="#C4A84F"><animate attributeName="opacity" values=".15;.85;.15" dur="3.5s" repeatCount="indefinite" begin="-2s"/></circle>
  <circle cx="400" cy="96" r="1.5" fill="#C4614F"><animate attributeName="opacity" values=".6;.1;.6" dur="2.6s" repeatCount="indefinite" begin="-1.8s"/></circle>
  <circle cx="572" cy="22" r="1.5" fill="#AFC3B2"><animate attributeName="opacity" values=".7;.1;.7" dur="2.4s" repeatCount="indefinite" begin="-.8s"/></circle>
  <circle cx="628" cy="90" r="2" fill="#5BA8C4"><animate attributeName="opacity" values=".25;.85;.25" dur="3.8s" repeatCount="indefinite" begin="-.4s"/></circle>
  <circle cx="755" cy="16" r="2" fill="#4F9D5B"><animate attributeName="opacity" values=".3;1;.3" dur="3.0s" repeatCount="indefinite" begin="-1.5s"/></circle>

  <!--
    DJINN SPRITES — pixel art 4px/pixel, 8×8 grid, centered at (0,0) at eye row (row 3)
    Two-group structure: outer (X position, static) + inner (Y position, animated)
    Fallback: if animateTransform stripped, inner static transform keeps sprite visible
  -->

  <!-- ══ VENUS DJINN (Earth · tan/brown · blue eyes) ══ -->
  <g transform="translate(110,0)">
    <g transform="translate(0,60)">
      <animateTransform attributeName="transform" type="translate"
        values="0,60; 0,47; 0,60" dur="3.2s" repeatCount="indefinite"
        calcMode="spline" keyTimes="0;.5;1" keySplines=".45 0 .55 1;.45 0 .55 1"/>
      <!-- row 0 -->
      <rect x="-8"  y="-12" width="4" height="4" fill="#A07830"/>
      <rect x="-4"  y="-12" width="4" height="4" fill="#A07830"/>
      <rect x="0"   y="-12" width="4" height="4" fill="#A07830"/>
      <rect x="4"   y="-12" width="4" height="4" fill="#A07830"/>
      <!-- row 1 -->
      <rect x="-12" y="-8" width="4" height="4" fill="#A07830"/>
      <rect x="-8"  y="-8" width="4" height="4" fill="#A07830"/>
      <rect x="-4"  y="-8" width="4" height="4" fill="#A07830"/>
      <rect x="0"   y="-8" width="4" height="4" fill="#A07830"/>
      <rect x="4"   y="-8" width="4" height="4" fill="#A07830"/>
      <rect x="8"   y="-8" width="4" height="4" fill="#A07830"/>
      <!-- row 2 -->
      <rect x="-16" y="-4" width="4" height="4" fill="#A07830"/>
      <rect x="-12" y="-4" width="4" height="4" fill="#A07830"/>
      <rect x="-8"  y="-4" width="4" height="4" fill="#A07830"/>
      <rect x="-4"  y="-4" width="4" height="4" fill="#604818"/>
      <rect x="0"   y="-4" width="4" height="4" fill="#604818"/>
      <rect x="4"   y="-4" width="4" height="4" fill="#A07830"/>
      <rect x="8"   y="-4" width="4" height="4" fill="#A07830"/>
      <rect x="12"  y="-4" width="4" height="4" fill="#A07830"/>
      <!-- row 3 (eyes) -->
      <rect x="-16" y="0" width="4" height="4" fill="#A07830"/>
      <rect x="-12" y="0" width="4" height="4" fill="#A07830"/>
      <rect x="-8"  y="0" width="4" height="4" fill="#4488FF"/>
      <rect x="-4"  y="0" width="4" height="4" fill="#604818"/>
      <rect x="0"   y="0" width="4" height="4" fill="#604818"/>
      <rect x="4"   y="0" width="4" height="4" fill="#4488FF"/>
      <rect x="8"   y="0" width="4" height="4" fill="#A07830"/>
      <rect x="12"  y="0" width="4" height="4" fill="#A07830"/>
      <!-- row 4 -->
      <rect x="-16" y="4" width="4" height="4" fill="#A07830"/>
      <rect x="-12" y="4" width="4" height="4" fill="#A07830"/>
      <rect x="-8"  y="4" width="4" height="4" fill="#A07830"/>
      <rect x="-4"  y="4" width="4" height="4" fill="#604818"/>
      <rect x="0"   y="4" width="4" height="4" fill="#604818"/>
      <rect x="4"   y="4" width="4" height="4" fill="#A07830"/>
      <rect x="8"   y="4" width="4" height="4" fill="#A07830"/>
      <rect x="12"  y="4" width="4" height="4" fill="#A07830"/>
      <!-- row 5 -->
      <rect x="-12" y="8" width="4" height="4" fill="#A07830"/>
      <rect x="-8"  y="8" width="4" height="4" fill="#A07830"/>
      <rect x="-4"  y="8" width="4" height="4" fill="#A07830"/>
      <rect x="0"   y="8" width="4" height="4" fill="#A07830"/>
      <rect x="4"   y="8" width="4" height="4" fill="#A07830"/>
      <rect x="8"   y="8" width="4" height="4" fill="#A07830"/>
      <!-- row 6 -->
      <rect x="-8"  y="12" width="4" height="4" fill="#A07830"/>
      <rect x="-4"  y="12" width="4" height="4" fill="#A07830"/>
      <rect x="0"   y="12" width="4" height="4" fill="#A07830"/>
      <rect x="4"   y="12" width="4" height="4" fill="#A07830"/>
      <!-- row 7 (spikes) -->
      <rect x="-12" y="16" width="4" height="4" fill="#604818"/>
      <rect x="8"   y="16" width="4" height="4" fill="#604818"/>
      <!-- particles -->
      <circle cx="-22" cy="-4" r="2" fill="#A07830"><animate attributeName="opacity" values=".9;.2;.9" dur="1.8s" repeatCount="indefinite"/></circle>
      <circle cx="20"  cy="2"  r="2" fill="#4488FF"><animate attributeName="opacity" values=".4;1;.4" dur="2.2s" repeatCount="indefinite" begin="-.7s"/></circle>
      <circle cx="-18" cy="10" r="1.5" fill="#604818"><animate attributeName="opacity" values=".6;.1;.6" dur="2.9s" repeatCount="indefinite" begin="-1.4s"/></circle>
    </g>
  </g>
  <text x="110" y="102" font-family="monospace" font-size="7" letter-spacing="1.5" fill="rgba(160,120,48,.6)" text-anchor="middle">VENUS</text>

  <!-- ══ MARS DJINN (Fire · red/orange · blue eye) ══ -->
  <g transform="translate(280,0)">
    <g transform="translate(0,62)">
      <animateTransform attributeName="transform" type="translate"
        values="0,62; 0,49; 0,62" dur="2.8s" repeatCount="indefinite" begin="-1.1s"
        calcMode="spline" keyTimes="0;.5;1" keySplines=".45 0 .55 1;.45 0 .55 1"/>
      <!-- row 0 -->
      <rect x="-8" y="-12" width="4" height="4" fill="#D84020"/>
      <rect x="-4" y="-12" width="4" height="4" fill="#F07818"/>
      <rect x="0"  y="-12" width="4" height="4" fill="#F07818"/>
      <rect x="4"  y="-12" width="4" height="4" fill="#D84020"/>
      <!-- row 1 -->
      <rect x="-12" y="-8" width="4" height="4" fill="#D84020"/>
      <rect x="-8"  y="-8" width="4" height="4" fill="#D84020"/>
      <rect x="-4"  y="-8" width="4" height="4" fill="#F07818"/>
      <rect x="0"   y="-8" width="4" height="4" fill="#F07818"/>
      <rect x="4"   y="-8" width="4" height="4" fill="#D84020"/>
      <rect x="8"   y="-8" width="4" height="4" fill="#D84020"/>
      <!-- row 2 -->
      <rect x="-16" y="-4" width="4" height="4" fill="#D84020"/>
      <rect x="-12" y="-4" width="4" height="4" fill="#D84020"/>
      <rect x="-8"  y="-4" width="4" height="4" fill="#F07818"/>
      <rect x="-4"  y="-4" width="4" height="4" fill="#F07818"/>
      <rect x="0"   y="-4" width="4" height="4" fill="#F07818"/>
      <rect x="4"   y="-4" width="4" height="4" fill="#F07818"/>
      <rect x="8"   y="-4" width="4" height="4" fill="#D84020"/>
      <rect x="12"  y="-4" width="4" height="4" fill="#D84020"/>
      <!-- row 3 (eye) -->
      <rect x="-16" y="0" width="4" height="4" fill="#D84020"/>
      <rect x="-12" y="0" width="4" height="4" fill="#D84020"/>
      <rect x="-8"  y="0" width="4" height="4" fill="#D84020"/>
      <rect x="-4"  y="0" width="4" height="4" fill="#2255FF"/>
      <rect x="0"   y="0" width="4" height="4" fill="#2255FF"/>
      <rect x="4"   y="0" width="4" height="4" fill="#D84020"/>
      <rect x="8"   y="0" width="4" height="4" fill="#D84020"/>
      <rect x="12"  y="0" width="4" height="4" fill="#D84020"/>
      <!-- row 4 -->
      <rect x="-16" y="4" width="4" height="4" fill="#D84020"/>
      <rect x="-12" y="4" width="4" height="4" fill="#D84020"/>
      <rect x="-8"  y="4" width="4" height="4" fill="#D84020"/>
      <rect x="-4"  y="4" width="4" height="4" fill="#2255FF"/>
      <rect x="0"   y="4" width="4" height="4" fill="#2255FF"/>
      <rect x="4"   y="4" width="4" height="4" fill="#D84020"/>
      <rect x="8"   y="4" width="4" height="4" fill="#D84020"/>
      <rect x="12"  y="4" width="4" height="4" fill="#D84020"/>
      <!-- row 5 -->
      <rect x="-12" y="8" width="4" height="4" fill="#D84020"/>
      <rect x="-8"  y="8" width="4" height="4" fill="#D84020"/>
      <rect x="-4"  y="8" width="4" height="4" fill="#F07818"/>
      <rect x="0"   y="8" width="4" height="4" fill="#F07818"/>
      <rect x="4"   y="8" width="4" height="4" fill="#D84020"/>
      <rect x="8"   y="8" width="4" height="4" fill="#D84020"/>
      <!-- row 6 -->
      <rect x="-4" y="12" width="4" height="4" fill="#D84020"/>
      <rect x="0"  y="12" width="4" height="4" fill="#D84020"/>
      <!-- row 7 (tail) -->
      <rect x="-8" y="16" width="4" height="4" fill="#D84020"/>
      <rect x="4"  y="16" width="4" height="4" fill="#D84020"/>
      <!-- particles -->
      <circle cx="22"  cy="-5" r="2" fill="#F07818"><animate attributeName="opacity" values=".9;.2;.9" dur="1.6s" repeatCount="indefinite"/></circle>
      <circle cx="-20" cy="4"  r="2" fill="#D84020"><animate attributeName="opacity" values=".4;.95;.4" dur="2.0s" repeatCount="indefinite" begin="-1.0s"/></circle>
      <circle cx="18"  cy="10" r="1.5" fill="#F07818"><animate attributeName="opacity" values=".6;.1;.6" dur="2.5s" repeatCount="indefinite" begin="-.5s"/></circle>
    </g>
  </g>
  <text x="280" y="102" font-family="monospace" font-size="7" letter-spacing="1.5" fill="rgba(216,64,32,.6)" text-anchor="middle">MARS</text>

  <!-- ══ MERCURY DJINN (Water · blue-green · yellow eyes · pink claw) ══ -->
  <g transform="translate(520,0)">
    <g transform="translate(0,60)">
      <animateTransform attributeName="transform" type="translate"
        values="0,60; 0,47; 0,60" dur="3.5s" repeatCount="indefinite" begin="-.7s"
        calcMode="spline" keyTimes="0;.5;1" keySplines=".45 0 .55 1;.45 0 .55 1"/>
      <!-- row 0 (spikes) -->
      <rect x="-12" y="-12" width="4" height="4" fill="#3090A0"/>
      <rect x="0"   y="-12" width="4" height="4" fill="#3090A0"/>
      <rect x="8"   y="-12" width="4" height="4" fill="#3090A0"/>
      <!-- row 1 -->
      <rect x="-12" y="-8" width="4" height="4" fill="#3090A0"/>
      <rect x="-8"  y="-8" width="4" height="4" fill="#3090A0"/>
      <rect x="-4"  y="-8" width="4" height="4" fill="#3090A0"/>
      <rect x="0"   y="-8" width="4" height="4" fill="#3090A0"/>
      <rect x="4"   y="-8" width="4" height="4" fill="#3090A0"/>
      <!-- row 2 -->
      <rect x="-16" y="-4" width="4" height="4" fill="#40A840"/>
      <rect x="-12" y="-4" width="4" height="4" fill="#40A840"/>
      <rect x="-8"  y="-4" width="4" height="4" fill="#3090A0"/>
      <rect x="-4"  y="-4" width="4" height="4" fill="#3090A0"/>
      <rect x="0"   y="-4" width="4" height="4" fill="#3090A0"/>
      <rect x="4"   y="-4" width="4" height="4" fill="#3090A0"/>
      <rect x="8"   y="-4" width="4" height="4" fill="#40A840"/>
      <rect x="12"  y="-4" width="4" height="4" fill="#40A840"/>
      <!-- row 3 (eyes) -->
      <rect x="-16" y="0" width="4" height="4" fill="#40A840"/>
      <rect x="-12" y="0" width="4" height="4" fill="#40A840"/>
      <rect x="-8"  y="0" width="4" height="4" fill="#C0A000"/>
      <rect x="-4"  y="0" width="4" height="4" fill="#40A840"/>
      <rect x="0"   y="0" width="4" height="4" fill="#40A840"/>
      <rect x="4"   y="0" width="4" height="4" fill="#C0A000"/>
      <rect x="8"   y="0" width="4" height="4" fill="#40A840"/>
      <rect x="12"  y="0" width="4" height="4" fill="#40A840"/>
      <!-- row 4 (all green) -->
      <rect x="-16" y="4" width="4" height="4" fill="#40A840"/>
      <rect x="-12" y="4" width="4" height="4" fill="#40A840"/>
      <rect x="-8"  y="4" width="4" height="4" fill="#40A840"/>
      <rect x="-4"  y="4" width="4" height="4" fill="#40A840"/>
      <rect x="0"   y="4" width="4" height="4" fill="#40A840"/>
      <rect x="4"   y="4" width="4" height="4" fill="#40A840"/>
      <rect x="8"   y="4" width="4" height="4" fill="#40A840"/>
      <rect x="12"  y="4" width="4" height="4" fill="#40A840"/>
      <!-- row 5 (claw + body) -->
      <rect x="-16" y="8" width="4" height="4" fill="#D04060"/>
      <rect x="-12" y="8" width="4" height="4" fill="#3090A0"/>
      <rect x="-8"  y="8" width="4" height="4" fill="#3090A0"/>
      <rect x="-4"  y="8" width="4" height="4" fill="#3090A0"/>
      <rect x="0"   y="8" width="4" height="4" fill="#3090A0"/>
      <rect x="4"   y="8" width="4" height="4" fill="#3090A0"/>
      <rect x="8"   y="8" width="4" height="4" fill="#3090A0"/>
      <!-- row 6 (claw tip + lower) -->
      <rect x="-16" y="12" width="4" height="4" fill="#D04060"/>
      <rect x="-4"  y="12" width="4" height="4" fill="#3090A0"/>
      <rect x="0"   y="12" width="4" height="4" fill="#3090A0"/>
      <!-- particles -->
      <circle cx="22"  cy="-6" r="2" fill="#3090A0"><animate attributeName="opacity" values=".85;.2;.85" dur="2.0s" repeatCount="indefinite" begin="-.3s"/></circle>
      <circle cx="-20" cy="2"  r="2" fill="#C0A000"><animate attributeName="opacity" values=".4;.9;.4" dur="2.4s" repeatCount="indefinite" begin="-1.2s"/></circle>
      <circle cx="18"  cy="10" r="1.5" fill="#D04060"><animate attributeName="opacity" values=".7;.1;.7" dur="1.9s" repeatCount="indefinite" begin="-.9s"/></circle>
    </g>
  </g>
  <text x="520" y="100" font-family="monospace" font-size="7" letter-spacing="1.5" fill="rgba(48,144,160,.6)" text-anchor="middle">MERCURY</text>

  <!-- ══ JUPITER DJINN (Wind · purple/blue · single large eye · wings) ══ -->
  <g transform="translate(688,0)">
    <g transform="translate(0,60)">
      <animateTransform attributeName="transform" type="translate"
        values="0,60; 0,47; 0,60" dur="2.6s" repeatCount="indefinite" begin="-1.9s"
        calcMode="spline" keyTimes="0;.5;1" keySplines=".45 0 .55 1;.45 0 .55 1"/>
      <!-- row 0 (wing tips) -->
      <rect x="-12" y="-12" width="4" height="4" fill="#8888CC"/>
      <rect x="8"   y="-12" width="4" height="4" fill="#8888CC"/>
      <!-- row 1 (wings + body) -->
      <rect x="-16" y="-8" width="4" height="4" fill="#8888CC"/>
      <rect x="-12" y="-8" width="4" height="4" fill="#8888CC"/>
      <rect x="-8"  y="-8" width="4" height="4" fill="#6050B0"/>
      <rect x="-4"  y="-8" width="4" height="4" fill="#6050B0"/>
      <rect x="0"   y="-8" width="4" height="4" fill="#6050B0"/>
      <rect x="4"   y="-8" width="4" height="4" fill="#6050B0"/>
      <rect x="8"   y="-8" width="4" height="4" fill="#8888CC"/>
      <rect x="12"  y="-8" width="4" height="4" fill="#8888CC"/>
      <!-- row 2 -->
      <rect x="-16" y="-4" width="4" height="4" fill="#8888CC"/>
      <rect x="-12" y="-4" width="4" height="4" fill="#6050B0"/>
      <rect x="-8"  y="-4" width="4" height="4" fill="#6050B0"/>
      <rect x="-4"  y="-4" width="4" height="4" fill="#6050B0"/>
      <rect x="0"   y="-4" width="4" height="4" fill="#6050B0"/>
      <rect x="4"   y="-4" width="4" height="4" fill="#6050B0"/>
      <rect x="8"   y="-4" width="4" height="4" fill="#6050B0"/>
      <rect x="12"  y="-4" width="4" height="4" fill="#8888CC"/>
      <!-- row 3 (large eye center) -->
      <rect x="-12" y="0" width="4" height="4" fill="#6050B0"/>
      <rect x="-8"  y="0" width="4" height="4" fill="#6050B0"/>
      <rect x="-4"  y="0" width="4" height="4" fill="#2266FF"/>
      <rect x="0"   y="0" width="4" height="4" fill="#2266FF"/>
      <rect x="4"   y="0" width="4" height="4" fill="#6050B0"/>
      <rect x="8"   y="0" width="4" height="4" fill="#6050B0"/>
      <!-- row 4 (eye continues) -->
      <rect x="-12" y="4" width="4" height="4" fill="#6050B0"/>
      <rect x="-8"  y="4" width="4" height="4" fill="#6050B0"/>
      <rect x="-4"  y="4" width="4" height="4" fill="#2266FF"/>
      <rect x="0"   y="4" width="4" height="4" fill="#2266FF"/>
      <rect x="4"   y="4" width="4" height="4" fill="#6050B0"/>
      <rect x="8"   y="4" width="4" height="4" fill="#6050B0"/>
      <!-- row 5 -->
      <rect x="-16" y="8" width="4" height="4" fill="#8888CC"/>
      <rect x="-12" y="8" width="4" height="4" fill="#6050B0"/>
      <rect x="-8"  y="8" width="4" height="4" fill="#6050B0"/>
      <rect x="-4"  y="8" width="4" height="4" fill="#6050B0"/>
      <rect x="0"   y="8" width="4" height="4" fill="#6050B0"/>
      <rect x="4"   y="8" width="4" height="4" fill="#6050B0"/>
      <rect x="8"   y="8" width="4" height="4" fill="#6050B0"/>
      <rect x="12"  y="8" width="4" height="4" fill="#8888CC"/>
      <!-- row 6 (wings spread) -->
      <rect x="-16" y="12" width="4" height="4" fill="#8888CC"/>
      <rect x="-12" y="12" width="4" height="4" fill="#8888CC"/>
      <rect x="8"   y="12" width="4" height="4" fill="#8888CC"/>
      <rect x="12"  y="12" width="4" height="4" fill="#8888CC"/>
      <!-- row 7 (wing tips) -->
      <rect x="-12" y="16" width="4" height="4" fill="#8888CC"/>
      <rect x="8"   y="16" width="4" height="4" fill="#8888CC"/>
      <!-- particles -->
      <circle cx="-22" cy="-5" r="2" fill="#8888CC"><animate attributeName="opacity" values=".9;.2;.9" dur="1.7s" repeatCount="indefinite" begin="-.4s"/></circle>
      <circle cx="22"  cy="-2" r="2" fill="#2266FF"><animate attributeName="opacity" values=".35;.95;.35" dur="2.0s" repeatCount="indefinite" begin="-1.0s"/></circle>
      <circle cx="18"  cy="10" r="1.5" fill="#6050B0"><animate attributeName="opacity" values=".6;.1;.6" dur="2.6s" repeatCount="indefinite" begin="-1.7s"/></circle>
    </g>
  </g>
  <text x="688" y="102" font-family="monospace" font-size="7" letter-spacing="1.5" fill="rgba(96,80,176,.7)" text-anchor="middle">JUPITER</text>

  <text x="400" y="111" font-family="monospace" font-size="7" letter-spacing="4" fill="rgba(175,195,178,.3)" text-anchor="middle">&#9670; DJINN &#9670;</text>
</svg>
