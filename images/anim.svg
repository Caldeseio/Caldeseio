<svg xmlns="http://www.w3.org/2000/svg" width="800" height="120" viewBox="0 0 800 120">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#1a2e1c" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0a0f0b" stop-opacity="0"/>
    </radialGradient>
    <filter id="orbGlow" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="markGlow" x="-250%" y="-250%" width="600%" height="600%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="9" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="starGlow" x="-500%" y="-500%" width="1100%" height="1100%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="scan" x="0" y="0" width="800" height="4" patternUnits="userSpaceOnUse">
      <rect x="0" y="3" width="800" height="1" fill="rgba(0,0,0,0.03)"/>
    </pattern>
  </defs>

  <!-- background -->
  <rect width="800" height="120" fill="#0a0f0b"/>
  <rect width="800" height="120" fill="url(#bgGlow)"/>
  <rect width="800" height="120" fill="url(#scan)"/>

  <!-- double border -->
  <rect x=".5" y=".5" width="799" height="119" fill="none" stroke="rgba(79,157,91,.35)" stroke-width="1"/>
  <rect x="3.5" y="3.5" width="793" height="113" fill="none" stroke="rgba(79,157,91,.12)" stroke-width="1"/>

  <!-- twinkling stars -->
  <circle cx="60" cy="20" r="1.5" fill="#AFC3B2" filter="url(#starGlow)">
    <animate attributeName="opacity" values=".8;.12;.8" dur="2.1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="160" cy="14" r="2" fill="#4F9D5B" filter="url(#starGlow)">
    <animate attributeName="opacity" values=".2;1;.2" dur="3.2s" repeatCount="indefinite" begin="-1.1s"/>
  </circle>
  <circle cx="290" cy="28" r="1.5" fill="#AFC3B2" filter="url(#starGlow)">
    <animate attributeName="opacity" values=".9;.1;.9" dur="2.8s" repeatCount="indefinite" begin="-.6s"/>
  </circle>
  <circle cx="510" cy="22" r="2" fill="#4F9D5B" filter="url(#starGlow)">
    <animate attributeName="opacity" values=".15;.9;.15" dur="3.5s" repeatCount="indefinite" begin="-2s"/>
  </circle>
  <circle cx="650" cy="17" r="1.5" fill="#AFC3B2" filter="url(#starGlow)">
    <animate attributeName="opacity" values=".7;.1;.7" dur="2.4s" repeatCount="indefinite" begin="-.8s"/>
  </circle>
  <circle cx="738" cy="30" r="2" fill="#4F9D5B" filter="url(#starGlow)">
    <animate attributeName="opacity" values=".3;1;.3" dur="3.0s" repeatCount="indefinite" begin="-1.5s"/>
  </circle>
  <circle cx="120" cy="92" r="1.5" fill="#AFC3B2" filter="url(#starGlow)">
    <animate attributeName="opacity" values=".6;.1;.6" dur="2.6s" repeatCount="indefinite" begin="-1.8s"/>
  </circle>
  <circle cx="678" cy="88" r="2" fill="#4F9D5B" filter="url(#starGlow)">
    <animate attributeName="opacity" values=".25;.85;.25" dur="3.8s" repeatCount="indefinite" begin="-.4s"/>
  </circle>

  <!-- floating orb 1 — left, green -->
  <circle cx="80" cy="62" r="5.5" fill="#4F9D5B" filter="url(#orbGlow)">
    <animate attributeName="cy" values="62;50;62" dur="3s" repeatCount="indefinite"
      calcMode="spline" keyTimes="0;.5;1" keySplines=".45 0 .55 1;.45 0 .55 1"/>
    <animate attributeName="opacity" values=".85;.4;.85" dur="3s" repeatCount="indefinite"
      calcMode="spline" keyTimes="0;.5;1" keySplines=".45 0 .55 1;.45 0 .55 1"/>
  </circle>

  <!-- floating orb 2 — left-center, boneOnInk -->
  <circle cx="195" cy="65" r="4" fill="#AFC3B2" filter="url(#orbGlow)">
    <animate attributeName="cy" values="65;55;65" dur="2.7s" repeatCount="indefinite" begin="-.9s"
      calcMode="spline" keyTimes="0;.5;1" keySplines=".45 0 .55 1;.45 0 .55 1"/>
    <animate attributeName="opacity" values=".65;.25;.65" dur="2.7s" repeatCount="indefinite" begin="-.9s"
      calcMode="spline" keyTimes="0;.5;1" keySplines=".45 0 .55 1;.45 0 .55 1"/>
  </circle>

  <!-- floating orb 3 — right-center, boneOnInk -->
  <circle cx="605" cy="62" r="4" fill="#AFC3B2" filter="url(#orbGlow)">
    <animate attributeName="cy" values="62;52;62" dur="3.3s" repeatCount="indefinite" begin="-1.6s"
      calcMode="spline" keyTimes="0;.5;1" keySplines=".45 0 .55 1;.45 0 .55 1"/>
    <animate attributeName="opacity" values=".6;.2;.6" dur="3.3s" repeatCount="indefinite" begin="-1.6s"
      calcMode="spline" keyTimes="0;.5;1" keySplines=".45 0 .55 1;.45 0 .55 1"/>
  </circle>

  <!-- floating orb 4 — right, green -->
  <circle cx="720" cy="58" r="5.5" fill="#4F9D5B" filter="url(#orbGlow)">
    <animate attributeName="cy" values="58;70;58" dur="2.5s" repeatCount="indefinite" begin="-.5s"
      calcMode="spline" keyTimes="0;.5;1" keySplines=".45 0 .55 1;.45 0 .55 1"/>
    <animate attributeName="opacity" values=".8;.35;.8" dur="2.5s" repeatCount="indefinite" begin="-.5s"
      calcMode="spline" keyTimes="0;.5;1" keySplines=".45 0 .55 1;.45 0 .55 1"/>
  </circle>

  <!-- central mark with pulse aura -->
  <g transform="translate(400,58)">
    <!-- expanding aura ring -->
    <circle cx="0" cy="0" r="30" fill="rgba(79,157,91,.06)">
      <animate attributeName="r" values="30;44;30" dur="3s" repeatCount="indefinite"
        calcMode="spline" keyTimes="0;.5;1" keySplines=".45 0 .55 1;.45 0 .55 1"/>
      <animate attributeName="opacity" values="1;.15;1" dur="3s" repeatCount="indefinite"
        calcMode="spline" keyTimes="0;.5;1" keySplines=".45 0 .55 1;.45 0 .55 1"/>
    </circle>
    <!-- mark with scale pulse — scale origin is (0,0) = global (400,58) -->
    <g filter="url(#markGlow)">
      <animateTransform attributeName="transform" type="scale"
        values="1;1.1;1" dur="3s" repeatCount="indefinite"
        calcMode="spline" keyTimes="0;.5;1" keySplines=".45 0 .55 1;.45 0 .55 1"/>
      <!-- translate(-20,-20) scale(.4) → maps 100×100 logo space to 40×40, centered at (0,0) -->
      <g transform="translate(-20,-20) scale(.4)">
        <circle cx="50" cy="50" r="40" stroke="#F1EDE3" stroke-width="7"
          stroke-linecap="round" stroke-dasharray="190 251" transform="rotate(38 50 50)"/>
        <circle cx="78" cy="28" r="8.5" fill="#4F9D5B"/>
      </g>
    </g>
  </g>
</svg>
